[pytest]
# Pytest configuration for Store Intelligence Platform

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    -l
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options
    --cov=src
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing
    # Fail if coverage below 70%
    --cov-fail-under=70
    # Show slowest 10 tests
    --durations=10
    # Disable warnings summary for cleaner output
    -p no:warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    property: Property-based tests using Hypothesis
    performance: Performance and benchmark tests
    slow: Tests that take significant time to run

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    # Standard pragmas
    pragma: no cover
    # Defensive programming
    raise AssertionError
    raise NotImplementedError
    # Debugging code
    def __repr__
    def __str__
    # Non-runnable code
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov

# Hypothesis configuration for property-based testing
[tool:pytest]
hypothesis_profile = default

# Console output styling
console_output_style = progress

# Timeout for tests (prevent hanging)
timeout = 300

# Fail on first error (useful for debugging, disable in CI)
# addopts = -x

# Parallel execution (uncomment to enable)
# addopts = -n auto
